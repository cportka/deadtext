<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; manifest-src 'self'; worker-src 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="DeadText" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <title>DeadText</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #ffffff;
      color: #111111;
    }
    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      box-sizing: border-box;
    }
    #text-editor {
      display: block;
      width: 100%;
      height: 100%;
      margin: 0;
      border: 0;
      padding: 12px 14px;
      box-sizing: border-box;
      resize: none;
      background: transparent;
      color: inherit;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.45;
      tab-size: 4;
      -moz-tab-size: 4;
      white-space: pre;
      overflow: auto;
    }
    #text-editor:focus { outline: none; }
    @media (prefers-color-scheme: dark) {
      html, body { background: #111111; color: #f4f4f4; }
      #text-editor::placeholder { color: #666; }
    }
  </style>
</head>
<body>
  <textarea id="text-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" wrap="off"></textarea>
  <script type="module" src="./renderer.js"></script>
</body>
</html>
