<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Background: deep noir black with subtle vertical gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>
  <!-- Skull, bone-white, centered and slightly raised to leave room for "txt" -->
  <g fill="#f0ede4" transform="translate(512 440)">
    <!-- Cranium with jaw -->
    <path d="
      M -210 -40
      C -210 -200, -120 -290, 0 -290
      C 120 -290, 210 -200, 210 -40
      C 210 30, 180 80, 150 110
      L 150 170
      C 150 195, 130 215, 105 215
      L 60 215
      L 60 175
      L 30 175
      L 30 215
      L -30 215
      L -30 175
      L -60 175
      L -60 215
      L -105 215
      C -130 215, -150 195, -150 170
      L -150 110
      C -180 80, -210 30, -210 -40
      Z
    "/>
  </g>
  <!-- Eye sockets: deep black voids -->
  <g fill="#000000" transform="translate(512 440)">
    <ellipse cx="-95" cy="-50" rx="55" ry="65"/>
    <ellipse cx="95" cy="-50" rx="55" ry="65"/>
  </g>
  <!-- Nasal cavity -->
  <g fill="#000000" transform="translate(512 440)">
    <path d="M 0 30 L -22 80 L 22 80 Z"/>
  </g>
  <!-- Tooth gaps and top jaw line -->
  <g stroke="#000000" stroke-width="6" stroke-linecap="butt" transform="translate(512 440)">
    <line x1="-30" y1="135" x2="-30" y2="215"/>
    <line x1="30" y1="135" x2="30" y2="215"/>
    <line x1="0" y1="135" x2="0" y2="215"/>
    <line x1="-90" y1="135" x2="90" y2="135"/>
  </g>
  <!-- "txt" wordmark beneath the skull -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="160"
     font-weight="700"
     fill="#f0ede4"
     text-anchor="middle"
     letter-spacing="8">
    <text x="512" y="830">txt</text>
  </g>
  <!-- Baseline rules under the wordmark, evoking ruled paper -->
  <g stroke="#3a3a3a" stroke-width="4">
    <line x1="320" y1="880" x2="704" y2="880"/>
    <line x1="360" y1="910" x2="664" y2="910"/>
  </g>
</svg>
